<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Training Tracker</title>
    
    <!-- Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Training Tracker">
    
    <!-- App Icons -->
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Mobile Optimierungen */
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        body {
            font-size: 18px;
            -webkit-font-smoothing: antialiased;
        }
        input, textarea, button {
            font-size: 18px !important;
            min-height: 48px;
        }
        table input {
            font-size: 16px !important;
            min-height: 44px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        function TrainingTracker() {
            const [currentView, setCurrentView] = useState('home'); // 'home', 'training', 'archive', 'detail'
            const [currentDate, setCurrentDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedSport, setSelectedSport] = useState(null);
            const [runningData, setRunningData] = useState({ distance: '', time: '' });
            const [gymData, setGymData] = useState(Array(12).fill().map(() => ({ 
                exercise: '', 
                weight: '', 
                set1: '', 
                set2: '', 
                set3: '', 
                set4: '', 
                set5: '' 
            })));
            const [anderesData, setAnderesData] = useState('');
            const [savedTrainings, setSavedTrainings] = useState({});
            const [selectedTrainingDetail, setSelectedTrainingDetail] = useState(null);

            // Load data from storage on mount
            useEffect(() => {
                loadData();
            }, []);

            // Archive old data weekly and delete after a month
            useEffect(() => {
                archiveOldData();
            }, []);

            const loadData = async () => {
                try {
                    const result = await window.storage.get('training-data');
                    if (result && result.value) {
                        setSavedTrainings(JSON.parse(result.value));
                    }
                } catch (error) {
                    console.log('Keine gespeicherten Daten gefunden');
                }
            };

            const saveData = async (data) => {
                try {
                    await window.storage.set('training-data', JSON.stringify(data));
                } catch (error) {
                    console.error('Fehler beim Speichern:', error);
                }
            };

            const archiveOldData = async () => {
                try {
                    const result = await window.storage.get('training-data');
                    if (!result || !result.value) return;

                    const data = JSON.parse(result.value);
                    const today = new Date();
                    const oneYearAgo = new Date(today.getTime() - 365 * 24 * 60 * 60 * 1000);
                    
                    // Filter out data older than one year
                    const filteredData = {};
                    Object.keys(data).forEach(date => {
                        const entryDate = new Date(date);
                        if (entryDate > oneYearAgo) {
                            filteredData[date] = data[date];
                        }
                    });

                    if (Object.keys(filteredData).length !== Object.keys(data).length) {
                        await window.storage.set('training-data', JSON.stringify(filteredData));
                        setSavedTrainings(filteredData);
                    }
                } catch (error) {
                    console.error('Fehler beim Archivieren:', error);
                }
            };

            const deleteTraining = async (date) => {
                if (confirm(`Training vom ${new Date(date).toLocaleDateString('de-DE')} wirklich löschen?`)) {
                    const newSavedTrainings = { ...savedTrainings };
                    delete newSavedTrainings[date];
                    setSavedTrainings(newSavedTrainings);
                    await saveData(newSavedTrainings);
                    alert('Training gelöscht! 🗑️');
                }
            };

            const handleSportSelect = (sport) => {
                setSelectedSport(sport);
                
                // Load existing data for this date if available
                if (savedTrainings[currentDate]) {
                    const saved = savedTrainings[currentDate];
                    if (saved.sport === sport) {
                        if (sport === 'laufen' && saved.data) {
                            setRunningData(saved.data);
                        } else if (sport === 'gym' && saved.data) {
                            setGymData(saved.data);
                        } else if (sport === 'anderes' && saved.data) {
                            setAnderesData(saved.data);
                        }
                    }
                }
            };

            const handleRunningChange = (field, value) => {
                setRunningData(prev => ({ ...prev, [field]: value }));
            };

            const handleGymChange = (index, field, value) => {
                const newGymData = [...gymData];
                newGymData[index][field] = value;
                setGymData(newGymData);
            };

            const saveTraining = async () => {
                let trainingData = {
                    sport: selectedSport,
                    date: currentDate
                };

                if (selectedSport === 'laufen') {
                    trainingData.data = runningData;
                } else if (selectedSport === 'gym') {
                    trainingData.data = gymData;
                } else if (selectedSport === 'anderes') {
                    trainingData.data = anderesData;
                }

                const newSavedTrainings = {
                    ...savedTrainings,
                    [currentDate]: trainingData
                };

                setSavedTrainings(newSavedTrainings);
                await saveData(newSavedTrainings);
                alert('Training gespeichert! ✅');
            };

            const resetForm = () => {
                setSelectedSport(null);
                setRunningData({ distance: '', time: '' });
                setGymData(Array(12).fill().map(() => ({ 
                    exercise: '', 
                    weight: '', 
                    set1: '', 
                    set2: '', 
                    set3: '', 
                    set4: '', 
                    set5: '' 
                })));
                setAnderesData('');
            };

            const getWeekNumber = (date) => {
                const d = new Date(date);
                d.setHours(0, 0, 0, 0);
                d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                const yearStart = new Date(d.getFullYear(), 0, 1);
                return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            };

            const getTrainingHistory = () => {
                const history = {};
                Object.entries(savedTrainings).forEach(([date, training]) => {
                    const week = getWeekNumber(date);
                    const year = new Date(date).getFullYear();
                    const weekKey = `${year}-W${week}`;
                    if (!history[weekKey]) {
                        history[weekKey] = [];
                    }
                    history[weekKey].push({ date, ...training });
                });
                return history;
            };

            const history = getTrainingHistory();
            const currentWeek = `${new Date().getFullYear()}-W${getWeekNumber(new Date())}`;

            // Detail View for a specific training
            if (currentView === 'detail' && selectedTrainingDetail) {
                const training = selectedTrainingDetail;
                return (
                    <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-100 p-4">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-white rounded-2xl shadow-xl p-6">
                                <div className="flex items-center justify-between mb-6">
                                    <h1 className="text-3xl font-bold text-gray-800">📋 Training Details</h1>
                                    <button
                                        onClick={() => {
                                            setCurrentView('archive');
                                            setSelectedTrainingDetail(null);
                                        }}
                                        className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-semibold transition-colors"
                                    >
                                        ← Zurück zum Archiv
                                    </button>
                                </div>

                                <div className="mb-6">
                                    <div className="flex items-center justify-between bg-gradient-to-r from-blue-100 to-purple-100 p-4 rounded-lg">
                                        <div>
                                            <p className="text-sm text-gray-600 mb-1">Datum</p>
                                            <p className="text-xl font-bold text-gray-800">
                                                {new Date(training.date).toLocaleDateString('de-DE', {
                                                    weekday: 'long',
                                                    day: '2-digit',
                                                    month: 'long',
                                                    year: 'numeric'
                                                })}
                                            </p>
                                        </div>
                                        <div className="bg-blue-500 text-white px-6 py-3 rounded-full text-xl font-bold">
                                            {training.sport}
                                        </div>
                                    </div>
                                </div>

                                {/* Tennis or Fussball */}
                                {(training.sport === 'tennis' || training.sport === 'fussball') && (
                                    <div className="bg-green-50 rounded-lg p-8 text-center">
                                        <div className="text-6xl mb-4">
                                            {training.sport === 'tennis' ? '🎾' : '⚽'}
                                        </div>
                                        <p className="text-2xl font-semibold text-gray-800">
                                            {training.sport === 'tennis' ? 'Tennis' : 'Fussball'} gespielt!
                                        </p>
                                    </div>
                                )}

                                {/* Running Details */}
                                {training.sport === 'laufen' && training.data && (
                                    <div className="bg-blue-50 rounded-lg p-6">
                                        <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                                            🏃 Lauf-Details
                                        </h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="bg-white rounded-lg p-6 shadow-md">
                                                <p className="text-sm text-gray-600 mb-2">Distanz</p>
                                                <p className="text-4xl font-bold text-blue-600">
                                                    {training.data.distance} <span className="text-2xl">km</span>
                                                </p>
                                            </div>
                                            <div className="bg-white rounded-lg p-6 shadow-md">
                                                <p className="text-sm text-gray-600 mb-2">Zeit</p>
                                                <p className="text-4xl font-bold text-green-600">
                                                    {training.data.time} <span className="text-2xl">min</span>
                                                </p>
                                            </div>
                                        </div>
                                        {training.data.distance && training.data.time && (
                                            <div className="mt-6 bg-white rounded-lg p-6 shadow-md">
                                                <p className="text-sm text-gray-600 mb-2">Durchschnittstempo</p>
                                                <p className="text-3xl font-bold text-purple-600">
                                                    {(training.data.time / training.data.distance).toFixed(2)} <span className="text-xl">min/km</span>
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Gym Details */}
                                {training.sport === 'gym' && training.data && (
                                    <div className="bg-purple-50 rounded-lg p-6">
                                        <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                                            💪 Gym-Übungen
                                        </h2>
                                        <div className="bg-white rounded-lg shadow-md overflow-hidden">
                                            <div className="overflow-x-auto">
                                                <table className="w-full">
                                                    <thead>
                                                        <tr className="bg-purple-600 text-white">
                                                            <th className="px-3 py-3 text-left font-semibold">Nr.</th>
                                                            <th className="px-3 py-3 text-left font-semibold">Übung</th>
                                                            <th className="px-3 py-3 text-left font-semibold">Gewicht</th>
                                                            <th className="px-3 py-3 text-left font-semibold">Satz 1</th>
                                                            <th className="px-3 py-3 text-left font-semibold">Satz 2</th>
                                                            <th className="px-3 py-3 text-left font-semibold">Satz 3</th>
                                                            <th className="px-3 py-3 text-left font-semibold">Satz 4</th>
                                                            <th className="px-3 py-3 text-left font-semibold">Satz 5</th>
                                                            <th className="px-3 py-3 text-left font-semibold">Gesamt</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {training.data
                                                            .map((row, index) => ({ ...row, index }))
                                                            .filter(row => row.exercise || row.weight || row.set1 || row.set2 || row.set3 || row.set4 || row.set5)
                                                            .map((row, displayIndex) => {
                                                                const totalReps = (parseInt(row.set1) || 0) + 
                                                                                (parseInt(row.set2) || 0) + 
                                                                                (parseInt(row.set3) || 0) + 
                                                                                (parseInt(row.set4) || 0) + 
                                                                                (parseInt(row.set5) || 0);
                                                                return (
                                                                    <tr key={row.index} className={displayIndex % 2 === 0 ? 'bg-gray-50' : 'bg-white'}>
                                                                        <td className="px-3 py-3 text-gray-700 font-medium">{displayIndex + 1}</td>
                                                                        <td className="px-3 py-3 text-gray-800 font-semibold">
                                                                            {row.exercise || '-'}
                                                                        </td>
                                                                        <td className="px-3 py-3 text-gray-700">
                                                                            {row.weight ? `${row.weight} kg` : '-'}
                                                                        </td>
                                                                        <td className="px-3 py-3 text-gray-700">
                                                                            {row.set1 ? `${row.set1}x` : '-'}
                                                                        </td>
                                                                        <td className="px-3 py-3 text-gray-700">
                                                                            {row.set2 ? `${row.set2}x` : '-'}
                                                                        </td>
                                                                        <td className="px-3 py-3 text-gray-700">
                                                                            {row.set3 ? `${row.set3}x` : '-'}
                                                                        </td>
                                                                        <td className="px-3 py-3 text-gray-700">
                                                                            {row.set4 ? `${row.set4}x` : '-'}
                                                                        </td>
                                                                        <td className="px-3 py-3 text-gray-700">
                                                                            {row.set5 ? `${row.set5}x` : '-'}
                                                                        </td>
                                                                        <td className="px-3 py-3 text-purple-600 font-bold">
                                                                            {totalReps > 0 ? `${totalReps}x` : '-'}
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                    </tbody>
                                                </table>
                                            </div>
                                            {training.data.filter(row => row.exercise || row.weight || row.set1 || row.set2 || row.set3 || row.set4 || row.set5).length === 0 && (
                                                <div className="p-8 text-center text-gray-500">
                                                    Keine Übungen eingetragen
                                                </div>
                                            )}
                                        </div>
                                        <div className="mt-6 grid grid-cols-2 gap-4">
                                            <div className="bg-white rounded-lg p-4 shadow-md">
                                                <p className="text-sm text-gray-600">Übungen insgesamt</p>
                                                <p className="text-3xl font-bold text-purple-600">
                                                    {training.data.filter(e => e.exercise).length}
                                                </p>
                                            </div>
                                            <div className="bg-white rounded-lg p-4 shadow-md">
                                                <p className="text-sm text-gray-600">Gesamte Wiederholungen</p>
                                                <p className="text-3xl font-bold text-purple-600">
                                                    {training.data.reduce((total, row) => {
                                                        return total + 
                                                            (parseInt(row.set1) || 0) + 
                                                            (parseInt(row.set2) || 0) + 
                                                            (parseInt(row.set3) || 0) + 
                                                            (parseInt(row.set4) || 0) + 
                                                            (parseInt(row.set5) || 0);
                                                    }, 0)}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Anderes Training Details */}
                                {training.sport === 'anderes' && training.data && (
                                    <div className="bg-orange-50 rounded-lg p-6">
                                        <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                                            🎯 Anderes Training
                                        </h2>
                                        <div className="bg-white rounded-lg p-6 shadow-md">
                                            <p className="text-gray-800 whitespace-pre-wrap leading-relaxed">
                                                {training.data}
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }
            if (currentView === 'home') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-yellow-100 via-pink-100 to-purple-200 p-6 flex items-center justify-center">
                        <div className="w-full px-2">
                            <div className="text-center mb-16">
                                <div className="text-8xl mb-6">🏋️</div>
                                <h1 className="text-5xl font-bold mb-4 text-gray-800">
                                    Training Tracker
                                </h1>
                                <p className="text-3xl text-gray-700 font-medium">Wähle eine Option</p>
                            </div>

                            <div className="space-y-8 mb-12">
                                <button
                                    onClick={() => setCurrentView('training')}
                                    className="w-full bg-gradient-to-r from-green-400 to-blue-500 active:from-green-600 active:to-blue-700 text-white text-4xl font-bold py-16 rounded-3xl shadow-2xl transform active:scale-95 transition-all duration-150 flex flex-col items-center justify-center gap-4"
                                >
                                    <span className="text-7xl">💪</span>
                                    <span>Training</span>
                                </button>

                                <button
                                    onClick={() => setCurrentView('archive')}
                                    className="w-full bg-gradient-to-r from-purple-400 to-pink-500 active:from-purple-600 active:to-pink-700 text-white text-4xl font-bold py-16 rounded-3xl shadow-2xl transform active:scale-95 transition-all duration-150 flex flex-col items-center justify-center gap-4"
                                >
                                    <span className="text-7xl">📊</span>
                                    <span>Archiv</span>
                                </button>
                            </div>

                            <div className="text-center">
                                <p className="text-2xl text-gray-600 font-semibold">
                                    Trainings Tracker by Moritz
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            // Archive Screen
            if (currentView === 'archive') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-purple-50 to-pink-100 p-4">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-white rounded-2xl shadow-xl p-6 mb-6">
                                <div className="flex items-center justify-between mb-6">
                                    <h1 className="text-3xl font-bold text-gray-800">📊 Archiv</h1>
                                    <button
                                        onClick={() => setCurrentView('home')}
                                        className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-semibold transition-colors"
                                    >
                                        ← Zurück
                                    </button>
                                </div>
                                
                                {Object.keys(history).length === 0 ? (
                                    <div className="text-center py-12">
                                        <p className="text-gray-500 text-lg">Noch keine Trainings gespeichert!</p>
                                    </div>
                                ) : (
                                    <>
                                        <p className="text-sm text-gray-600 mb-4">
                                            Daten werden nach einem Jahr automatisch gelöscht
                                        </p>
                                        {Object.keys(history)
                                            .sort()
                                            .reverse()
                                            .map(weekKey => (
                                                <div key={weekKey} className="mb-6">
                                                    <h3 className="text-lg font-semibold text-gray-700 mb-3 flex items-center">
                                                        {weekKey === currentWeek ? '📍 ' : ''}
                                                        Woche {weekKey.split('-W')[1]}, {weekKey.split('-W')[0]}
                                                        {weekKey === currentWeek && <span className="ml-2 text-sm text-green-600">(Aktuelle Woche)</span>}
                                                    </h3>
                                                    <div className="grid gap-3">
                                                        {history[weekKey].map((training, idx) => (
                                                            <div key={idx} className="bg-gray-50 rounded-lg p-4 border border-gray-200 relative group">
                                                                <button
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        deleteTraining(training.date);
                                                                    }}
                                                                    className="absolute top-3 right-3 bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-sm font-semibold opacity-0 group-hover:opacity-100 transition-opacity"
                                                                    title="Training löschen"
                                                                >
                                                                    🗑️ Löschen
                                                                </button>
                                                                <button
                                                                    onClick={() => {
                                                                        setSelectedTrainingDetail(training);
                                                                        setCurrentView('detail');
                                                                    }}
                                                                    className="bg-transparent hover:bg-blue-50 rounded-lg transition-all text-left w-full cursor-pointer"
                                                                >
                                                                    <div className="flex justify-between items-start mb-2">
                                                                        <span className="font-semibold text-gray-800">
                                                                            {new Date(training.date).toLocaleDateString('de-DE', {
                                                                                weekday: 'short',
                                                                                day: '2-digit',
                                                                                month: '2-digit',
                                                                                year: 'numeric'
                                                                            })}
                                                                        </span>
                                                                        <span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-semibold">
                                                                            {training.sport}
                                                                        </span>
                                                                    </div>
                                                                    {training.sport === 'laufen' && training.data && (
                                                                        <p className="text-sm text-gray-600">
                                                                            🏃 {training.data.distance} km in {training.data.time} Minuten
                                                                        </p>
                                                                    )}
                                                                    {training.sport === 'gym' && training.data && (
                                                                        <div className="text-sm text-gray-600">
                                                                            💪 {training.data.filter(e => e.exercise).length} Übungen absolviert
                                                                        </div>
                                                                    )}
                                                                    {training.sport === 'anderes' && training.data && (
                                                                        <p className="text-sm text-gray-600 line-clamp-2">
                                                                            🎯 {training.data.substring(0, 100)}{training.data.length > 100 ? '...' : ''}
                                                                        </p>
                                                                    )}
                                                                    <p className="text-xs text-blue-600 mt-2">→ Klicken für Details</p>
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // Training Screen
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                    <div className="max-w-4xl mx-auto">
                        <div className="bg-white rounded-2xl shadow-xl p-6 mb-6">
                            <div className="flex items-center justify-between mb-4">
                                <h1 className="text-3xl font-bold text-gray-800">🏋️ Training</h1>
                                <button
                                    onClick={() => {
                                        setCurrentView('home');
                                        resetForm();
                                    }}
                                    className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-semibold transition-colors"
                                >
                                    ← Zurück
                                </button>
                            </div>
                            <p className="text-gray-600 mb-6">Dokumentiere dein Training heute!</p>

                            {/* Date Selection */}
                            <div className="mb-6">
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Datum</label>
                                <input
                                    type="date"
                                    value={currentDate}
                                    onChange={(e) => {
                                        setCurrentDate(e.target.value);
                                        resetForm();
                                    }}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                />
                                {savedTrainings[currentDate] && (
                                    <p className="mt-2 text-sm text-green-600">
                                        ✓ Training für diesen Tag bereits eingetragen: {savedTrainings[currentDate].sport}
                                    </p>
                                )}
                            </div>

                            {/* Sport Selection */}
                            <div className="mb-6">
                                <label className="block text-sm font-semibold text-gray-700 mb-3">Sportart wählen</label>
                                <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                                    {['tennis', 'fussball', 'laufen', 'gym', 'anderes'].map(sport => (
                                        <button
                                            key={sport}
                                            onClick={() => handleSportSelect(sport)}
                                            className={`px-4 py-3 rounded-lg font-semibold transition-all ${
                                                selectedSport === sport
                                                    ? 'bg-blue-600 text-white shadow-lg scale-105'
                                                    : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                            }`}
                                        >
                                            {sport.charAt(0).toUpperCase() + sport.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Running Form */}
                            {selectedSport === 'laufen' && (
                                <div className="bg-blue-50 rounded-lg p-6 mb-6">
                                    <h3 className="text-lg font-semibold text-gray-800 mb-4">🏃 Laufen Details</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Distanz (km)
                                            </label>
                                            <input
                                                type="number"
                                                step="0.1"
                                                value={runningData.distance}
                                                onChange={(e) => handleRunningChange('distance', e.target.value)}
                                                placeholder="z.B. 5.5"
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Zeit (Minuten)
                                            </label>
                                            <input
                                                type="number"
                                                value={runningData.time}
                                                onChange={(e) => handleRunningChange('time', e.target.value)}
                                                placeholder="z.B. 35"
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Gym Form */}
                            {selectedSport === 'gym' && (
                                <div className="bg-purple-50 rounded-lg p-6 mb-6">
                                    <h3 className="text-lg font-semibold text-gray-800 mb-4">💪 Gym Übungen</h3>
                                    <p className="text-sm text-gray-600 mb-4">Trage für jeden Satz die Wiederholungen ein (maximal 5 Sätze pro Übung)</p>
                                    <div className="overflow-x-auto">
                                        <table className="w-full">
                                            <thead>
                                                <tr className="bg-purple-100">
                                                    <th className="px-2 py-2 text-left text-sm font-semibold text-gray-700">Nr.</th>
                                                    <th className="px-2 py-2 text-left text-sm font-semibold text-gray-700">Übung</th>
                                                    <th className="px-2 py-2 text-left text-sm font-semibold text-gray-700">Gewicht (kg)</th>
                                                    <th className="px-2 py-2 text-left text-sm font-semibold text-gray-700">Satz 1</th>
                                                    <th className="px-2 py-2 text-left text-sm font-semibold text-gray-700">Satz 2</th>
                                                    <th className="px-2 py-2 text-left text-sm font-semibold text-gray-700">Satz 3</th>
                                                    <th className="px-2 py-2 text-left text-sm font-semibold text-gray-700">Satz 4</th>
                                                    <th className="px-2 py-2 text-left text-sm font-semibold text-gray-700">Satz 5</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {gymData.map((row, index) => (
                                                    <tr key={index} className="border-b border-purple-100">
                                                        <td className="px-2 py-2 text-sm text-gray-600">{index + 1}</td>
                                                        <td className="px-2 py-2">
                                                            <input
                                                                type="text"
                                                                value={row.exercise}
                                                                onChange={(e) => handleGymChange(index, 'exercise', e.target.value)}
                                                                placeholder="z.B. Bankdrücken"
                                                                className="w-full px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-purple-500 text-sm"
                                                            />
                                                        </td>
                                                        <td className="px-2 py-2">
                                                            <input
                                                                type="number"
                                                                step="0.5"
                                                                value={row.weight}
                                                                onChange={(e) => handleGymChange(index, 'weight', e.target.value)}
                                                                placeholder="kg"
                                                                className="w-20 px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-purple-500 text-sm"
                                                            />
                                                        </td>
                                                        <td className="px-2 py-2">
                                                            <input
                                                                type="number"
                                                                value={row.set1}
                                                                onChange={(e) => handleGymChange(index, 'set1', e.target.value)}
                                                                placeholder="Wdh."
                                                                className="w-16 px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-purple-500 text-sm"
                                                            />
                                                        </td>
                                                        <td className="px-2 py-2">
                                                            <input
                                                                type="number"
                                                                value={row.set2}
                                                                onChange={(e) => handleGymChange(index, 'set2', e.target.value)}
                                                                placeholder="Wdh."
                                                                className="w-16 px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-purple-500 text-sm"
                                                            />
                                                        </td>
                                                        <td className="px-2 py-2">
                                                            <input
                                                                type="number"
                                                                value={row.set3}
                                                                onChange={(e) => handleGymChange(index, 'set3', e.target.value)}
                                                                placeholder="Wdh."
                                                                className="w-16 px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-purple-500 text-sm"
                                                            />
                                                        </td>
                                                        <td className="px-2 py-2">
                                                            <input
                                                                type="number"
                                                                value={row.set4}
                                                                onChange={(e) => handleGymChange(index, 'set4', e.target.value)}
                                                                placeholder="Wdh."
                                                                className="w-16 px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-purple-500 text-sm"
                                                            />
                                                        </td>
                                                        <td className="px-2 py-2">
                                                            <input
                                                                type="number"
                                                                value={row.set5}
                                                                onChange={(e) => handleGymChange(index, 'set5', e.target.value)}
                                                                placeholder="Wdh."
                                                                className="w-16 px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-purple-500 text-sm"
                                                            />
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* Anderes Training Form */}
                            {selectedSport === 'anderes' && (
                                <div className="bg-orange-50 rounded-lg p-6 mb-6">
                                    <h3 className="text-lg font-semibold text-gray-800 mb-4">🎯 Anderes Training</h3>
                                    <p className="text-sm text-gray-600 mb-4">Beschreibe dein Training (z.B. Yoga, Schwimmen, Radfahren, etc.)</p>
                                    <textarea
                                        value={anderesData}
                                        onChange={(e) => setAnderesData(e.target.value)}
                                        placeholder="Was hast du trainiert? Beschreibe Details wie Dauer, Intensität, besondere Übungen..."
                                        rows="8"
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent resize-none"
                                    />
                                </div>
                            )}

                            {/* Save Button */}
                            {selectedSport && (
                                <div className="flex gap-3">
                                    <button
                                        onClick={saveTraining}
                                        className="flex-1 bg-green-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-green-700 transition-colors shadow-lg"
                                    >
                                        💾 Training speichern
                                    </button>
                                    <button
                                        onClick={resetForm}
                                        className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition-colors"
                                    >
                                        Zurücksetzen
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<TrainingTracker />, document.getElementById('root'));
    </script>
</body>
</html>
